<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="GAF Master Elite Residential Roofing Contractor">
  <defs>
    <linearGradient id="gafBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#0c1f4f"/>
    </linearGradient>
    <linearGradient id="gafGold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="55%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
  </defs>
  <!-- Outer shield -->
  <path d="M100 6 L188 30 L188 100 C188 148 152 180 100 194 C48 180 12 148 12 100 L12 30 Z"
        fill="url(#gafBg)" stroke="url(#gafGold)" stroke-width="4"/>
  <!-- Inner ring -->
  <circle cx="100" cy="92" r="58" fill="none" stroke="url(#gafGold)" stroke-width="2.5"/>
  <!-- GAF text -->
  <text x="100" y="78" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="900"
        fill="#fde68a" text-anchor="middle" letter-spacing="2">GAF</text>
  <text x="100" y="102" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800"
        fill="#fff" text-anchor="middle" letter-spacing="3">MASTER</text>
  <text x="100" y="120" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800"
        fill="#fff" text-anchor="middle" letter-spacing="4">ELITE</text>
  <!-- ribbon banner -->
  <rect x="22" y="160" width="156" height="22" fill="url(#gafGold)" rx="2"/>
  <text x="100" y="176" font-family="Inter, Arial, sans-serif" font-size="9.5" font-weight="800"
        fill="#1e3a8a" text-anchor="middle" letter-spacing="1.5">RESIDENTIAL ROOFING CONTRACTOR</text>
  <!-- small star accents -->
  <text x="40" y="60" font-size="14" fill="#fde68a">★</text>
  <text x="148" y="60" font-size="14" fill="#fde68a">★</text>
</svg>
