<svg viewBox="0 0 500 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="500" height="200" fill="white"/>
  
  <!-- UG Logo Mark with Flag -->
  <g id="logo-mark">
    <!-- Blue UG initials -->
    <text x="150" y="110" font-family="Arial, sans-serif" font-size="80" font-weight="bold" fill="#003366" letter-spacing="-5">UG</text>
    
    <!-- American flag accent (small flag in top right of mark) -->
    <g transform="translate(220, 50)">
      <!-- Flag pole -->
      <rect x="0" y="0" width="3" height="35" fill="#003366"/>
      <!-- Flag red stripes -->
      <rect x="3" y="0" width="25" height="5" fill="#DC143C"/>
      <rect x="3" y="10" width="25" height="5" fill="#DC143C"/>
      <rect x="3" y="20" width="25" height="5" fill="#DC143C"/>
      <!-- Flag blue section -->
      <rect x="3" y="0" width="12" height="15" fill="#003366"/>
    </g>
  </g>
  
  <!-- Text "UNITED GROUP" -->
  <text x="150" y="165" font-family="Arial, sans-serif" font-size="42" font-weight="bold" fill="#003366" letter-spacing="2">UNITED GROUP</text>
</svg>
